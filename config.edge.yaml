trading:
  mode: paper
  symbols:
  - BTC/USDT:USDT
  default_leverage: 5
  max_leverage: 8
  timeframe: 1h
  higher_timeframe: 4h
  lookback_periods: 120
  htf_lookback: 80
risk:
  max_risk_per_trade: 0.012
  max_drawdown: 0.15
  max_open_positions: 2
  max_same_side_positions: 1
  cooldown_after_losses: 3
  max_consecutive_losses: 3
  cooldown_hours: 6
  daily_loss_limit: 0.025
  trailing_stop_activation: 0.012
  trailing_stop_distance: 0.006
  chandelier_atr_mult: 2.3
  win_streak_cooldown: false
  partial_tp_enabled: true
  partial_be_buffer_atr: 0.12
strategy:
  name: composite
  trend_follow:
    enabled: false
    enabled_pairs: []
    adx_threshold: 25
    max_extension_atr: 0.55
  breakout:
    enabled: false
  mean_reversion:
    enabled: true
    strength: 0.76
    max_adx: 30
    min_z: 0.88
    min_volume_ratio: 0.55
    runner_extension_atr: 0.4
    rsi_period: 10
    rsi_overbought: 70
    rsi_oversold: 30
    bb_period: 20
    bb_std: 2.0
  keepalive:
    enabled: false
    symbol_base: SOL
    interval_hours: 16
    strength: 0.04
    max_per_week: 2
competition:
  min_edges: 1
  min_rr: 1.35
  allow_asia_mr: true
  skip_asia_trend: true
  htf_directional_bias: true
  long_only: false
  partial_tp: true
  pure_edge: true
  disabled_pairs:
  - ETH
  - SOL
edges:
  funding_extreme: 0.0003
  funding_crowded: 0.0005
indicators:
  atr_period: 14
  vwap_period: 20
  ema_fast: 9
  ema_slow: 21
  adx_period: 14
sizing:
  method: fixed_fractional
  default_win_rate: 0.52
  min_position_usd: 10
  max_position_pct: 0.75
backtest:
  initial_capital: 10000
  commission_rate: 0.0006
  slippage_pct: 0.0005
  use_kill_switch: false
logging:
  level: INFO
  file: logs/trading.log
  console: true
  state_file: data/bot_state.json
_tune:
  variant: comp_no_eth_v851
  note: WFO preferred no-ETH; wick soft; 90d was green on prior KA-capped stack
