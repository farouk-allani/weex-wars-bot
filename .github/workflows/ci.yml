name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Smoke tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run smoke tests
        run: python test_bot.py

      - name: Import check
        run: |
          python -c "from src.strategies.composite import CompositeStrategy; from src.core.engine import TradingEngine; from dashboard.app import app; print('imports ok')"

      - name: Docker build (verify image)
        run: docker build -t weex-wars-bot:ci .
