<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none" role="img" aria-label="WEEX Wars Bot">
  <defs>
    <linearGradient id="g" x1="16" y1="12" x2="112" y2="116" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3D8BFD"/>
      <stop offset="0.55" stop-color="#22D3A6"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="g2" x1="40" y1="28" x2="96" y2="100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E8F4FF"/>
      <stop offset="1" stop-color="#9EE7D0"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- rounded plate -->
  <rect x="8" y="8" width="112" height="112" rx="28" fill="#0A1220"/>
  <rect x="8" y="8" width="112" height="112" rx="28" fill="url(#g)" opacity="0.18"/>
  <rect x="10" y="10" width="108" height="108" rx="26" stroke="url(#g)" stroke-width="2" opacity="0.85"/>
  <!-- chart W / double peak -->
  <g filter="url(#glow)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M30 78 L46 42 L64 70 L82 34 L98 78" stroke="url(#g)" stroke-width="8" fill="none"/>
    <path d="M30 78 L46 42 L64 70 L82 34 L98 78" stroke="url(#g2)" stroke-width="3.5" fill="none" opacity="0.95"/>
  </g>
  <!-- base line + tick -->
  <path d="M28 88 H100" stroke="#3D8BFD" stroke-width="2" opacity="0.35" stroke-linecap="round"/>
  <circle cx="98" cy="34" r="4.5" fill="#22D3A6"/>
  <circle cx="98" cy="34" r="8" stroke="#22D3A6" stroke-width="1.5" opacity="0.35"/>
</svg>
