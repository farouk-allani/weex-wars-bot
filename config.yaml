# WEEX AI Wars II Trading Bot — Competition Config v8
# High-conviction trend + ranging mean-reversion + SOL keep-alive
# Strength-scaled sizing, real HTF confluence, fixed SL/TP plumbing

trading:
  mode: paper                 # paper | live
  symbols:
    - BTC/USDT:USDT
    - ETH/USDT:USDT
    - SOL/USDT:USDT
  default_leverage: 5
  max_leverage: 8
  timeframe: 1h
  higher_timeframe: 4h        # Real multi-timeframe confirmation
  lookback_periods: 120
  htf_lookback: 80

risk:
  max_risk_per_trade: 0.015   # 1.5% base risk (scaled by signal strength)
  max_drawdown: 0.15          # Kill at 15% DD
  max_open_positions: 2
  cooldown_after_losses: 3
  max_consecutive_losses: 3
  daily_loss_limit: 0.03      # 3% daily loss limit
  trailing_stop_activation: 0.012   # Start trail at +1.2% price move
  trailing_stop_distance: 0.006     # 0.6% trail floor
  chandelier_atr_mult: 2.5
  win_streak_cooldown: false  # Competition: do not pause winners
  max_consecutive_wins: 8
  cooldown_after_wins: 1

strategy:
  name: composite
  trend_follow:
    enabled: true
    weight: 0.65
    macd_fast: 8
    macd_slow: 21
    macd_signal: 5
    bb_period: 20
    bb_std: 1.8
    adx_threshold: 28         # Strong trends preferred
  mean_reversion:
    enabled: true
    weight: 0.25
    rsi_period: 10
    rsi_overbought: 75
    rsi_oversold: 25
    bb_period: 20
    bb_std: 2.0
  keepalive:
    enabled: true
    symbol_base: SOL          # Activity pair only
    interval_hours: 8
    strength: 0.18            # Tiny size via strength scaling

edges:
  funding_extreme: 0.0003     # 0.03% — real crowded zone
  funding_crowded: 0.0005     # Block entries with the crowd

indicators:
  atr_period: 14
  vwap_period: 20
  ema_fast: 9
  ema_slow: 21
  adx_period: 14

sizing:
  method: half_kelly
  default_win_rate: 0.50
  min_position_usd: 10
  max_position_pct: 0.18

backtest:
  initial_capital: 10000
  commission_rate: 0.0006
  slippage_pct: 0.001

logging:
  level: INFO
  file: logs/trading.log
  console: true
