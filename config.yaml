# WEEX AI Wars II — Competition Config v8.5.1
# Winner from WFO: comp_no_eth (skip ETH)
# Wick quality = size bonus (not hard gate)
# Soft 90d green history; 120d still choppy — survival first

trading:
  mode: paper
  symbols:
    - BTC/USDT:USDT
    - SOL/USDT:USDT          # ETH disabled (drag in WFO)
  default_leverage: 5
  max_leverage: 8
  timeframe: 1h
  higher_timeframe: 4h
  lookback_periods: 120
  htf_lookback: 80

risk:
  max_risk_per_trade: 0.012
  max_drawdown: 0.15
  max_open_positions: 2
  # BTC/SOL are ~0.8 correlated: 2 shorts is one bet at 2x size, not 2 positions.
  max_same_side_positions: 1
  cooldown_after_losses: 3
  max_consecutive_losses: 3
  cooldown_hours: 6
  daily_loss_limit: 0.025
  trailing_stop_activation: 0.012
  trailing_stop_distance: 0.006
  chandelier_atr_mult: 2.3
  win_streak_cooldown: false
  partial_tp_enabled: true
  partial_be_buffer_atr: 0.12

strategy:
  name: composite
  trend_follow:
    enabled: false
    enabled_pairs: []
    adx_threshold: 25
    max_extension_atr: 0.55
  breakout:
    enabled: false
  mean_reversion:
    enabled: true
    strength: 0.76
    max_adx: 30
    min_z: 0.88
    min_volume_ratio: 0.55
    runner_extension_atr: 0.4
    rsi_period: 10
    rsi_overbought: 70
    rsi_oversold: 30
    bb_period: 20
    bb_std: 2.0
  keepalive:
    enabled: true
    symbol_base: SOL
    interval_hours: 16
    strength: 0.04
    max_per_week: 2

competition:
  min_edges: 1
  min_rr: 1.35
  allow_asia_mr: true
  skip_asia_trend: true
  htf_directional_bias: true
  long_only: false
  partial_tp: true
  pure_edge: false
  disabled_pairs:
    - ETH

edges:
  funding_extreme: 0.0003
  funding_crowded: 0.0005

indicators:
  atr_period: 14
  vwap_period: 20
  ema_fast: 9
  ema_slow: 21
  adx_period: 14

sizing:
  # Fixed-fractional: risk_amount / stop_distance already IS the 1.2% risk budget.
  # Multiplying that by half-Kelly on top double-shrinks it — and at a 0.52 default
  # win rate Kelly pins to its 0.15 floor for any R:R under ~2.5, so every trade was
  # sized at ~1/8 of the stated budget until a strategy accumulated 5+ closed trades.
  method: fixed_fractional
  default_win_rate: 0.52
  min_position_usd: 10
  # Notional ceiling as a fraction of equity (x strength). At a typical ~2% stop the
  # risk formula wants ~0.6x equity notional, so 0.15 was the real binding cap, not
  # the risk budget. This now only catches pathologically tight stops.
  max_position_pct: 0.75

backtest:
  initial_capital: 10000
  commission_rate: 0.0006
  slippage_pct: 0.0005
  use_kill_switch: false

logging:
  level: INFO
  file: logs/trading.log
  console: true
  state_file: data/bot_state.json

_tune:
  variant: comp_no_eth_v851
  note: "WFO preferred no-ETH; wick soft; 90d was green on prior KA-capped stack"
