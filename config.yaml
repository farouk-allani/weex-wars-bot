# WEEX AI Wars — AI-driven config.
# DeepSeek is the primary decision-maker; the risk block below is a hard veto layer
# it cannot override. Rules: ranking by cumulative PnL, min 10 trades, max 20x
# leverage, >8h without AI logs is non-compliant.

# AI decision layer
ai:
  enabled: true
  provider: deepseek
  model: deepseek-chat          # deepseek-reasoner logs full chain-of-thought (richer
                                # compliance artifact, slower + pricier per call)
  base_url: https://api.deepseek.com
  temperature: 0.3
  max_tokens: 2000
  timeout_seconds: 90
  max_retries: 2
  # Every call writes an AI log entry, trade or no trade. 60min keeps us far inside
  # the 8h inactivity rule even if several calls fail in a row.
  decision_interval_minutes: 60
  min_conviction: 0.35          # below this, the model's own doubt vetoes the trade
  min_stop_atr: 0.5             # tighter than this is noise-stopped
  max_stop_atr: 4.0             # wider than this is not a trade
  # RSI/Bollinger/StochRSI/VWAP + edge_signals in the AI context. Measured: triggers
  # a memorised "fade to VWAP" reflex (~80% of decisions) with no PnL benefit in any
  # replay arm. Do not enable without re-running run_ai_replay A/B first.
  include_oscillators: false
  log_file: logs/ai_decisions.jsonl

# Execution: how orders reach the venue. Round-trip cost with market orders
# measured 0.22% of notional vs a best measured edge of ~0.13%/trade — the spread
# and taker fee were the entire losing margin. Maker entries rest at the touch,
# chase a little, and abandon rather than ever cross the spread.
execution:
  maker_entries: true
  maker_fee_rate: 0.0002        # WEEX futures maker tier; taker stays at backtest.commission_rate
  entry_ttl_minutes: 45         # unfilled after this = the setup left without us; fine
  reprice_seconds: 180          # re-quote toward the touch at most this often
  max_chase_atr: 0.5            # never chase price further than this from the signal

trading:
  mode: paper
  # The 8 pairs WEEX permits. Anything else is disqualified.
  symbols:
  - BTC/USDT:USDT
  - ETH/USDT:USDT
  - SOL/USDT:USDT
  - BNB/USDT:USDT
  - XRP/USDT:USDT
  - DOGE/USDT:USDT
  - ADA/USDT:USDT
  - LTC/USDT:USDT
  default_leverage: 5
  max_leverage: 20              # competition ceiling
  timeframe: 1h
  higher_timeframe: 4h
  # 200h > 1 week, so the model's 7d change and 72h levels actually populate.
  lookback_periods: 200
  htf_lookback: 80
risk:
  max_risk_per_trade: 0.012
  max_drawdown: 0.15
  max_open_positions: 3
  max_same_side_positions: 2
  cooldown_after_losses: 3
  max_consecutive_losses: 3
  cooldown_hours: 6
  daily_loss_limit: 0.025
  trailing_stop_activation: 0.012
  trailing_stop_distance: 0.006
  chandelier_atr_mult: 2.3
  win_streak_cooldown: false
  partial_tp_enabled: true
  partial_be_buffer_atr: 0.12
strategy:
  name: composite
  trend_follow:
    enabled: false
    enabled_pairs: []
    adx_threshold: 25
    max_extension_atr: 0.55
  breakout:
    enabled: false
  mean_reversion:
    enabled: true
    strength: 0.76
    max_adx: 30
    min_z: 0.88
    min_volume_ratio: 0.55
    runner_extension_atr: 0.4
    rsi_period: 10
    rsi_overbought: 70
    rsi_oversold: 30
    bb_period: 20
    bb_std: 2.0
  keepalive:
    enabled: true            # 3/10 trades at day 5 — DQ insurance, tiny maker in-outs
    symbol_base: SOL
    interval_hours: 12
    strength: 0.04
    max_per_week: 5
competition:
  min_trades: 10                # below this = disqualified
  # ends_at: "2026-07-28T12:00:00"   # set this so the AI knows its clock
  min_edges: 1
  min_rr: 1.35
  allow_asia_mr: true
  skip_asia_trend: true
  htf_directional_bias: true
  long_only: false
  partial_tp: true
  pure_edge: true
  disabled_pairs: []
edges:
  funding_extreme: 0.0003
  funding_crowded: 0.0005
indicators:
  atr_period: 14
  vwap_period: 20
  ema_fast: 9
  ema_slow: 21
  adx_period: 14
sizing:
  method: fixed_fractional
  default_win_rate: 0.52
  min_position_usd: 10
  max_position_pct: 0.75
backtest:
  # WEEX resets every account to 1,000 USDT at the start. Sizing off 10,000 would
  # propose positions the real account cannot margin.
  initial_capital: 1000
  commission_rate: 0.0006
  slippage_pct: 0.0005
  use_kill_switch: false
logging:
  level: INFO
  file: logs/trading.log
  console: true
  state_file: data/bot_state.json
_tune:
  variant: pure_edge_multi
  full_pnl: 157.31
  oos_pnl: 12.85
  days: 120
  version: v8.5
