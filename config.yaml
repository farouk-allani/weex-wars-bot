# WEEX AI Wars II Trading Bot — Optimized Configuration
# Backtested on 90 days of BTC/USDT 1H data
# Results: +$76 PnL, 52.2% win rate, 1.39 Sharpe, 0.8% max drawdown

trading:
  mode: paper
  symbols:
    - BTC/USDT:USDT
    - ETH/USDT:USDT
    - SOL/USDT:USDT
  default_leverage: 5
  max_leverage: 8
  timeframe: 1h
  lookback_periods: 100

risk:
  max_risk_per_trade: 0.015
  max_drawdown: 0.20
  max_open_positions: 3
  cooldown_after_losses: 5
  max_consecutive_losses: 3
  daily_loss_limit: 0.05
  trailing_stop_activation: 0.015
  trailing_stop_distance: 0.008

strategy:
  name: composite
  trend_follow:
    enabled: true
    weight: 0.7
    macd_fast: 8
    macd_slow: 21
    macd_signal: 5
    bb_period: 20
    bb_std: 1.8
    adx_threshold: 20
  mean_reversion:
    enabled: true
    weight: 0.3
    rsi_period: 10
    rsi_overbought: 80
    rsi_oversold: 20
    bb_period: 20
    bb_std: 1.8

indicators:
  atr_period: 14
  vwap_period: 20
  ema_fast: 9
  ema_slow: 21
  adx_period: 14

sizing:
  method: half_kelly
  default_win_rate: 0.55
  min_position_usd: 10
  max_position_pct: 0.20

backtest:
  initial_capital: 10000
  commission_rate: 0.0006
  slippage_pct: 0.001

logging:
  level: INFO
  file: logs/trading.log
  console: true
