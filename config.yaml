# WEEX AI Wars II — Competition Config v8.4
# Portfolio risk + partial TP + adaptive strategy/pair weights
# Primary edge: mean-reversion (BTC preferred). Breakouts OFF.

trading:
  mode: paper
  symbols:
    - BTC/USDT:USDT
    - ETH/USDT:USDT
    - SOL/USDT:USDT
  default_leverage: 5
  max_leverage: 8
  timeframe: 1h
  higher_timeframe: 4h
  lookback_periods: 120
  htf_lookback: 80

risk:
  max_risk_per_trade: 0.012
  max_drawdown: 0.15
  max_open_positions: 2
  cooldown_after_losses: 3
  max_consecutive_losses: 3
  cooldown_hours: 6           # time-based (avoids deadlock)
  daily_loss_limit: 0.025
  trailing_stop_activation: 0.012
  trailing_stop_distance: 0.006
  chandelier_atr_mult: 2.4
  win_streak_cooldown: false
  partial_tp_enabled: true
  partial_be_buffer_atr: 0.1

strategy:
  name: composite
  trend_follow:
    enabled: false
    enabled_pairs: []         # pullbacks lost on SOL in portfolio tests
    adx_threshold: 25
    max_extension_atr: 0.55
  breakout:
    enabled: false
    lookback: 20
    adx_min: 22
    volume_mult: 1.5
  mean_reversion:
    enabled: true
    strength: 0.74
    max_adx: 32
    min_z: 0.85              # slightly looser so BTC MR fires more
    min_volume_ratio: 0.55
    rsi_period: 10
    rsi_overbought: 70
    rsi_oversold: 30
    bb_period: 20
    bb_std: 2.0
  keepalive:
    enabled: true
    symbol_base: SOL
    interval_hours: 16         # only if no trades across book
    strength: 0.04             # micro size — activity only
    max_per_week: 3            # hard cap (KA is a tax)

competition:
  min_edges: 1
  min_rr: 1.35
  allow_asia_mr: true
  skip_asia_trend: true
  htf_directional_bias: true
  long_only: false
  partial_tp: true

edges:
  funding_extreme: 0.0003
  funding_crowded: 0.0005

indicators:
  atr_period: 14
  vwap_period: 20
  ema_fast: 9
  ema_slow: 21
  adx_period: 14

sizing:
  method: half_kelly
  default_win_rate: 0.52
  min_position_usd: 10
  max_position_pct: 0.15

backtest:
  initial_capital: 10000
  commission_rate: 0.0006
  slippage_pct: 0.0005
  use_kill_switch: false

logging:
  level: INFO
  file: logs/trading.log
  console: true
  state_file: data/bot_state.json
