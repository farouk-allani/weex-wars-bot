# WEEX AI Wars II Trading Bot — Competition Config v5: Competition Killer
# SOL: +$241, 69.2% WR, PF=4.30, Sharpe=3.23, DD=0.9%
# ETH: +$49, 47.4% WR, PF=1.19, Sharpe=0.46
# BTC: -$226 (minimal exposure, 19 trades)
# Dynamic allocation: 88% SOL, 20% ETH, 20% BTC
# Features: Funding filter, time filter, correlation guard, chandelier exit

trading:
  mode: paper
  symbols:
    - BTC/USDT:USDT
    - ETH/USDT:USDT
    - SOL/USDT:USDT
  default_leverage: 5
  max_leverage: 8
  timeframe: 1h
  lookback_periods: 100

risk:
  max_risk_per_trade: 0.015
  max_drawdown: 0.15          # Kill at 15% DD (tighter for competition)
  max_open_positions: 2       # Max 2 positions at once
  cooldown_after_losses: 3    # Wait 3 trades after 3 losses
  max_consecutive_losses: 3
  daily_loss_limit: 0.03      # 3% daily loss limit
  trailing_stop_activation: 0.012   # Activate trailing at 1.2% profit
  trailing_stop_distance: 0.006     # Trail at 0.6%

strategy:
  name: composite
  trend_follow:
    enabled: true
    weight: 0.7
    macd_fast: 8
    macd_slow: 21
    macd_signal: 5
    bb_period: 20
    bb_std: 1.8
    adx_threshold: 30         # Strong trends only (was 25)
  mean_reversion:
    enabled: true
    weight: 0.3
    rsi_period: 10
    rsi_overbought: 78        # More extreme (was 80, but now only WITH trend)
    rsi_oversold: 22
    bb_period: 20
    bb_std: 1.8

indicators:
  atr_period: 14
  vwap_period: 20
  ema_fast: 9
  ema_slow: 21
  adx_period: 14

sizing:
  method: half_kelly
  default_win_rate: 0.50      # Conservative estimate
  min_position_usd: 10
  max_position_pct: 0.20

backtest:
  initial_capital: 10000
  commission_rate: 0.0006
  slippage_pct: 0.001

logging:
  level: INFO
  file: logs/trading.log
  console: true
